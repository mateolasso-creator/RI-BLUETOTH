services:
  web:
    build: .
    container_name: web_server
    ports:
      - "8088:80"
    depends_on:
      - db
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpassword
      - MYSQL_DATABASE=rfid_access
    volumes:
      # CAMBIO CLAVE: Ahora apunta a ./src directamente
      - ./src:/var/www/html
    networks:
      - rfid_net

  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rfid_access
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Asegúrate de que el nuevo init.sql esté aquí
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rfid_net

volumes:
  db_data:

networks:
  rfid_net:
    driver: bridge